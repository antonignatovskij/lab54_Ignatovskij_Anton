{% extends "base.html" %}

{% block nav %}
<a class="nav-link" href="{% url 'add_category' %}">
    Добавить категорию
</a>
<a class="nav-link" href="{% url 'add_product' %}">
    Добавить товар
</a>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-warning text-dark text-center py-3">
                <h3 class="mb-0">Вы точно хотите удалить товар?</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row text-center">
                        <div class="col">
                            <a href="{% url 'products_list_v2' %}" class="btn btn-outline-secondary px-5 py-3 rounded-5 fs-5 fw-semibold">нет</a>
                        </div>
                        <div class="col">
                            <button type="submit" class="btn btn-outline-warning px-5 py-3 rounded-5 fs-5 fw-semibold">
                                да
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
