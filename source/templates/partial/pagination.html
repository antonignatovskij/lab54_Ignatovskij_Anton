<nav aria-label="Навигация по страницам" class="d-flex justify-content-center mt-5">
    <ul class="pagination">

        <li class="page-item {% if page_obj.number == 1 %}disabled{% endif %}">
            <a class="page-link" href="?page=1{% if query %}&{{ query }}{% endif %}">&laquo;</a>
        </li>

        <li class="page-item {% if not page_obj.has_previous %}disabled{% endif %}">
            {% if page_obj.has_previous %}
                <a class="page-link" href="?page={{ page_obj.previous_page_number }}{% if query %}&{{ query }}{% endif %}">Назад</a>
            {% else %}
                <span class="page-link">Назад</span>
            {% endif %}
        </li>

        <li class="page-item disabled">
            <span class="page-link">
                {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}
            </span>
        </li>

        <li class="page-item {% if not page_obj.has_next %}disabled{% endif %}">
            {% if page_obj.has_next %}
                <a class="page-link" href="?page={{ page_obj.next_page_number }}{% if query %}&{{ query }}{% endif %}">Далее</a>
            {% else %}
                <span class="page-link">Далее</span>
            {% endif %}
        </li>

        <li class="page-item {% if page_obj.number == page_obj.paginator.num_pages %}disabled{% endif %}">
            <a class="page-link" href="?page={{ page_obj.paginator.num_pages }}{% if query %}&{{ query }}{% endif %}">&raquo;</a>
        </li>
    </ul>
</nav>
